<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>BarraBus</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

</head>

<body>

  <header class="hero">

    <div class="hero-content">

      <span class="tag">
        Mobilidade Urbana • Barra Bonita
      </span>

      <h1>
        🚌 BarraBus
      </h1>

      <p>
        Descubra pontos, linhas e horários
        de ônibus da cidade.
      </p>

    </div>

  </header>

  <main class="container">

    <section class="search-box">

      <input
        type="text"
        id="busca"
        placeholder="Digite bairro, rua ou linha..."
      >

      <button id="localizacaoBtn">
        📍 Minha localização
      </button>

    </section>

    <section class="status-bar">

      <span id="quantidadeResultados">
        Carregando pontos...
      </span>

    </section>

    <section
      class="resultados"
      id="resultados"
    >
    </section>

    <section class="mapa-section">

      <div class="mapa-topo">

        <h2>
          🗺️ Mapa da Cidade
        </h2>

        <p>
          Visualização dos pontos de ônibus
        </p>

      </div>

      <div id="map"></div>

    </section>

  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="script.js"></script>

</body>

</html>
